modLoader="javafml"
loaderVersion="[47,)"
license="${license}"

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
authors="${mod_author}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[${forge_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[${minecraft_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="architectury"
mandatory=true
versionRange="[9.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="cloth_config"
mandatory=true
versionRange="[11.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
mandatory=true
versionRange="[${create_version},)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config="railwaysuntold.mixins.json"

[[mixins]]
config="railwaysuntold-copycats.mixins.json"

[[mixins]]
config="railwaysuntold-framedblocks.mixins.json"
